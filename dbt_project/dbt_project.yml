name: "olist_analytics"
version: "1.0.0"
config-version: 2

profile: "olist_warehouse"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# ============================================================
# Materialization defaults
# ============================================================
models:
  olist_analytics:
    staging:
      +materialized: view
      +schema: staging
    core:
      +materialized: table
      +schema: core
