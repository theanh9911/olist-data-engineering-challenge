name: TC Data Platform CI/CD

# Trigger: chạy khi push hoặc mở PR vào nhánh main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ============================================================
# BIẾN DÙNG CHUNG TOÀN BỘ PIPELINE
# ============================================================
env:
  PYTHON_VERSION: "3.11"
  DBT_VERSION: "1.7.*"
  POSTGRES_HOST: localhost
  POSTGRES_PORT: 5432
  POSTGRES_DB: olist_sales_test
  POSTGRES_USER: test_user
  POSTGRES_PASSWORD: test_password

jobs:
  # ============================================================
  # JOB 1: TÍCH HỢP LIÊN TỤC (CI)
  # Nguyên tắc "Fail Fast": kiểm tra nhanh/rẻ trước, chậm sau
  # Thứ tự: Lint → Setup DB → Ingest → dbt run → dbt test
  # ============================================================
  continuous-integration:
    name: CI — Test Data Pipeline
    runs-on: ubuntu-latest

    # Postgres test DB chạy song song ngay từ đầu để tiết kiệm thời gian
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: olist_sales_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      # ── A. Checkout ──────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── B. Setup Python ───────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── C. Cài uv (package manager) ───────────────────────────
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      # ── D. Cài tất cả dependencies vào venv tuyệt đối ─────────
      # Pin dbt version khớp với Dockerfile để đảm bảo môi trường nhất quán
      - name: Install Python dependencies
        run: |
          uv venv
          echo "$GITHUB_WORKSPACE/.venv/bin" >> $GITHUB_PATH
          uv pip install \
            ruff==0.5.* \
            "dbt-postgres==${{ env.DBT_VERSION }}" \
            kagglehub \
            pandas \
            psycopg2-binary \
            openpyxl

      # ── E. [FAIL FAST] Lint Python — kiểm tra trước khi làm gì ─
      # Nếu code Python lỗi style → fail ngay, không tốn thời gian DB
      - name: Lint Python code (ruff)
        run: |
          ruff check ingestion/ scripts/

      # ── F. Cache dataset Kaggle để né tải lại mỗi lần ──────────
      - name: Cache Olist dataset
        id: cache-olist
        uses: actions/cache@v4
        with:
          path: data/
          key: olist-dataset-v1

      # ── G. Tải dataset nếu cache miss ────────────────────────
      - name: Download Olist dataset (if not cached)
        if: steps.cache-olist.outputs.cache-hit != 'true'
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          uv run python scripts/download_data.py

      # ── H. Khởi tạo schemas trong Postgres test ───────────────
      - name: Initialize database schemas
        env:
          PGPASSWORD: ${{ env.POSTGRES_PASSWORD }}
        run: |
          psql -h ${{ env.POSTGRES_HOST }} \
               -U ${{ env.POSTGRES_USER }} \
               -d ${{ env.POSTGRES_DB }} \
               -f scripts/init_db.sql

      # ── I. Nạp dữ liệu thô (Bronze layer) ────────────────────
      - name: Ingest CSV → raw schema
        working-directory: ingestion
        run: |
          uv run python src/load_csv.py

      # ── J. Cài dbt packages (dbt_utils) ──────────────────────
      - name: Install dbt packages
        working-directory: dbt_project
        run: |
          dbt deps

      # ── K. Chạy dbt snapshot (SCD Type 2) ────────────────────
      - name: Run dbt snapshot
        working-directory: dbt_project
        run: |
          dbt snapshot --profiles-dir .

      # ── L. Chạy dbt models (Silver + Gold layer) ─────────────
      - name: Run dbt models
        working-directory: dbt_project
        run: |
          dbt run --profiles-dir .

      # ── M. [QUAN TRỌNG NHẤT] Chạy dbt tests ──────────────────
      # Kiểm tra toàn bộ ràng buộc dữ liệu và reconciliation
      - name: Run dbt tests
        working-directory: dbt_project
        run: |
          dbt test --profiles-dir .

  # ============================================================
  # JOB 2: GIAO HÀNG LIÊN TỤC (CD)
  # Nguyên tắc: chỉ deploy khi CI đã pass hoàn toàn
  # Chỉ chạy khi merge vào main (không chạy khi mở PR)
  # ============================================================
  continuous-deployment:
    name: CD — Build & Push Docker Image
    needs: continuous-integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # Cấp quyền ghi vào GitHub Container Registry
    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Setup Docker Buildx (hỗ trợ build cache) ──────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 3. Đăng nhập vào GitHub Container Registry ───────────
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── 4. Build & Push image Airflow ─────────────────────────
      # Tag cả latest và SHA cụ thể để có thể rollback chính xác
      - name: Build and push Airflow image
        uses: docker/build-push-action@v5
        with:
          context: ./airflow
          push: true
          # Cache layer Docker để build nhanh hơn ở lần sau
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/${{ github.repository }}/olist-airflow:latest
            ghcr.io/${{ github.repository }}/olist-airflow:${{ github.sha }}
